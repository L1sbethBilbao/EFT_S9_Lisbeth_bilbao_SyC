spring.application.name=backendS8
server.port=8080

# --- Conexión a MySQL (Docker o instalación local) ---
# Cadena JDBC: host, puerto 3306, base de datos unidos_animales, parámetros de zona horaria y SSL.
spring.datasource.url=jdbc:mysql://localhost:3306/unidos_animales?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT (HS256 requiere secreto suficientemente largo; en producción usar variable de entorno)
app.jwt.secret=cambia-este-secreto-en-produccion-minimo-32-caracteres-recomendado-64bytes!!
app.jwt.expiration-ms=86400000

# Credencial inicial de usuarios demo (evaluación): mover a variable APP_SEED_USER_PASSWORD en producción.
app.seed.user-password=${APP_SEED_USER_PASSWORD:Duoc2026!}
