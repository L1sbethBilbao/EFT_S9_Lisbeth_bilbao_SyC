spring.application.name=frontendS8
server.port=8081

# URL base del backend API (mismo equipo: localhost; en Docker usar nombre del servicio)
app.backend.base-url=http://localhost:8080

# JSESSIONID: SameSite mitiga CSRF y envío cross-site (alerta ZAP "cookie sin SameSite").
# Lax: recomendado para flujo típico con enlaces externos hacia el sitio. Strict endurece más pero puede romper flujos entre orígenes.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# En despliegue HTTPS activar: server.servlet.session.cookie.secure=true

# Solo cookie para el id de sesión (evita reescritura de URL con jsessionid en enlaces).
server.servlet.session.tracking-modes=cookie
