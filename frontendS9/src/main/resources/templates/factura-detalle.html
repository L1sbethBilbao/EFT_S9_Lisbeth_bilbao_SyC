<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Factura</title>
	<link rel="stylesheet" th:href="@{/css/fundacion.css}"/>
	<script defer th:src="@{/js/print.js}"></script>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="container catalog-page gestion-form-page factura-print">
	<p th:if="${mensaje}" class="flash" th:text="${mensaje}"></p>
	<section th:if="${factura != null}">
		<header class="catalog-page-head">
			<h1 class="catalog-page-title">Factura <span th:text="${factura.numeroFactura()}"></span></h1>
			<p class="hint catalog-page-lead">
				Fecha: <span th:text="${factura.fechaEmision()}"></span>
				· Mascota: <span th:text="${factura.animalNombre()}"></span>
			</p>
		</header>
		<div class="catalog-section">
			<div class="solicitud-card catalog-card catalog-card--table">
				<div class="table-wrap">
					<table class="data-table data-table--catalog">
						<thead><tr><th>Tipo</th><th>Descripción</th><th>Monto</th></tr></thead>
						<tbody>
						<tr th:each="l : ${factura.lineas()}">
							<td th:text="${l.tipo()}"></td>
							<td th:text="${l.descripcion()}"></td>
							<td th:text="${l.monto()}"></td>
						</tr>
						</tbody>
						<tfoot><tr><td colspan="2"><strong>Total</strong></td><td><strong th:text="${factura.total()}"></strong></td></tr></tfoot>
					</table>
				</div>
				<div class="factura-detalle-toolbar">
					<button type="button" class="btn ghost js-print">Imprimir</button>
				</div>
				<form th:action="@{/facturas/{id}/enviar-correo(id=${factura.id()})}" method="post" class="stack-form factura-envio-form">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<label>Enviar copia por correo (demo)
						<input type="email" name="email" placeholder="cliente@correo.cl" required/>
					</label>
					<div class="form-actions"><button type="submit" class="btn primary">Enviar</button></div>
				</form>
				<p><a class="btn ghost" th:href="@{/facturas}">← Volver al listado</a></p>
			</div>
		</div>
	</section>
</main>
</body>
</html>
