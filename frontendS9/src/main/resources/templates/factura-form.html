<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Nueva factura</title>
	<link rel="stylesheet" th:href="@{/css/fundacion.css}"/>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="container catalog-page gestion-form-page gestion-form-page--wide">
	<header class="catalog-page-head">
		<h1 class="catalog-page-title">Emitir factura</h1>
		<p class="hint catalog-page-lead">Defina hasta dos líneas de cargo (servicio, medicamento u otro). Los montos se sumarán en el total del documento.</p>
	</header>
	<section class="catalog-section">
		<div class="solicitud-card catalog-card">
			<form th:action="@{/facturas}" method="post" th:object="${facturaForm}" class="stack-form">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<input type="hidden" th:field="*{registroMedicoId}"/>
				<h2 class="adopcion-col-section-title">Línea 1</h2>
				<label>Tipo
					<select th:field="*{lineas[0].tipo}">
						<option value="SERVICIO">Servicio</option>
						<option value="MEDICAMENTO">Medicamento</option>
						<option value="OTRO">Otro cargo</option>
					</select>
				</label>
				<label>Descripción<input type="text" th:field="*{lineas[0].descripcion}" required/></label>
				<label>Monto<input type="number" step="0.01" min="0" th:field="*{lineas[0].monto}" required/></label>
				<h2 class="adopcion-col-section-title">Línea 2</h2>
				<label>Tipo
					<select th:field="*{lineas[1].tipo}">
						<option value="SERVICIO">Servicio</option>
						<option value="MEDICAMENTO">Medicamento</option>
						<option value="OTRO">Otro cargo</option>
					</select>
				</label>
				<label>Descripción<input type="text" th:field="*{lineas[1].descripcion}" required/></label>
				<label>Monto<input type="number" step="0.01" min="0" th:field="*{lineas[1].monto}" required/></label>
				<div class="form-actions"><button type="submit" class="btn primary">Emitir</button><a class="btn ghost" th:href="@{/registros-medicos}">Volver</a></div>
			</form>
		</div>
	</section>
</main>
</body>
</html>
