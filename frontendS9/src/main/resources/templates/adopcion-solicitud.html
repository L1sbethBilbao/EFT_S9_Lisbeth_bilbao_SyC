<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Solicitud de adopción</title>
	<link rel="stylesheet" th:href="@{/css/fundacion.css}"/>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="container adopcion-solicitud-page">
	<p th:if="${backendError}" class="alert" th:text="${backendError}"></p>
	<p th:if="${errorApi}" class="alert" th:text="${errorApi}"></p>
	<th:block th:if="${mascota != null}">
		<header class="catalog-page-head">
			<h1 class="catalog-page-title">Solicitud de adopción</h1>
			<p class="hint catalog-page-lead">
				Complete el formulario con sus datos de contacto y contexto del hogar. Está solicitando adoptar a
				<strong th:text="${mascota.nombre()}">—</strong>
				(<span th:text="${mascota.especie()}">—</span>).
			</p>
		</header>
		<section class="catalog-section">
			<h2 class="adopcion-col-section-title">Datos del solicitante y del hogar</h2>
			<div class="solicitud-card">
				<form method="post" th:action="@{/adopciones/solicitar}" th:object="${adopcionForm}" class="adopcion-publica-form">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<input type="hidden" th:field="*{animalId}"/>
					<label><span>Nombre completo *</span>
						<input type="text" th:field="*{nombreCompleto}" required maxlength="200"/></label>
					<label><span>Correo electrónico *</span>
						<input type="email" th:field="*{email}" required maxlength="255"/></label>
					<label><span>Teléfono</span>
						<input type="text" th:field="*{telefono}" maxlength="40"/></label>
					<label><span>Ciudad / comuna</span>
						<input type="text" th:field="*{ciudad}" maxlength="120"/></label>
					<label class="adopcion-publica-span-2"><span>Dirección</span>
						<input type="text" th:field="*{direccion}" maxlength="300"/></label>
					<label><span>Tipo de vivienda *</span>
						<select th:field="*{tipoVivienda}" required>
							<option value="CASA">Casa</option>
							<option value="DEPARTAMENTO">Departamento</option>
							<option value="CAMPO">Campo / rural</option>
							<option value="OTRO">Otro</option>
						</select></label>
					<label><span>Personas en el hogar *</span>
						<input type="number" th:field="*{personasEnHogar}" min="1" required/></label>
					<div class="adopcion-publica-checks" role="group" aria-label="Composición del hogar">
						<label class="checkbox-row"><input type="checkbox" th:field="*{tieneNinos}"/><span>Hay niños en el hogar</span></label>
						<label class="checkbox-row"><input type="checkbox" th:field="*{tieneOtrasMascotas}"/><span>Ya tengo otras mascotas</span></label>
					</div>
					<label class="adopcion-publica-span-2"><span>Experiencia previa con mascotas</span>
						<textarea th:field="*{experienciaMascotas}" rows="4" maxlength="4000" placeholder="Opcional"></textarea></label>
					<label class="adopcion-publica-span-2"><span>Motivación para adoptar *</span>
						<textarea th:field="*{motivacionAdopcion}" rows="5" maxlength="4000" required
						          placeholder="Cuéntenos por qué desea adoptar y cómo puede cuidar a la mascota."></textarea></label>
					<div class="form-actions adopcion-publica-actions">
						<button type="submit" class="btn primary">Enviar solicitud</button>
						<a class="btn ghost" th:href="@{/mascotas/{id}(id=${mascota.id()})}">Volver a la ficha</a>
					</div>
				</form>
			</div>
		</section>
	</th:block>
</main>
</body>
</html>
