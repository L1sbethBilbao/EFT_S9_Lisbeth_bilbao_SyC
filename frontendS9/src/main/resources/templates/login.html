<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Iniciar sesión · Unidos por Los Animales</title>
	<link rel="stylesheet" th:href="@{/css/fundacion.css}"/>
</head>
<body class="auth-body">
<main class="auth-card">
	<h1>Iniciar sesión</h1>
	<p class="hint">Usuarios de prueba: <strong>maria</strong>, <strong>pedro</strong>, <strong>luis</strong><br/>
		Clave: <strong>Duoc2026!</strong></p>
	<p th:if="${loginError}" class="alert" th:text="${loginError}"></p>
	<form th:action="@{/login}" method="post" class="stack-form">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<label>
			<span>Usuario</span>
			<input type="text" name="username" autocomplete="username" required/>
		</label>
		<label>
			<span>Contraseña</span>
			<input type="password" name="password" autocomplete="current-password" required/>
		</label>
		<button type="submit" class="btn primary block">Entrar</button>
	</form>
	<p class="back"><a th:href="@{/}">← Volver al inicio</a></p>
</main>
</body>
</html>
